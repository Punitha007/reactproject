<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Header</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }
        body{
            background:#f5f5f5;
        }
        .navbar{
            width:100%;
            height:80px;
            background:#111827;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:0 50px;
        }
        .nav-left{
            display:flex;
            align-items:center;
            gap:15px;
        }
        .logo img{
            width:55px;
            height:55px;
            border-radius:50%;
            object-fit:cover;
        }
        .heading{
            color:white;
            font-size:28px;
            font-weight:bold;
        }
        .nav-links{
            display:flex;
            list-style:none;
            gap:30px;
        }
        .nav-links li a{
            text-decoration:none;
            color:white;
            font-size:18px;
            transition:0.3s;
        }
        .nav-links li a:hover{
            color:#38bdf8;
        }
        .btn{
            padding:10px 20px;
            background:#38bdf8;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }
        .btn:hover{
            background:#0ea5e9;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <div class="logo">
                <img src="twiter.jpg" alt="logo">
            </div>
            <div class="heading">
                Twitter
            </div>
        </div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>

        <button class="btn">Sign In</button>
    </nav>

</body>
</html>
